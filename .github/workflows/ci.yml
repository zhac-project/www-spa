#
# SPA build CI (FINDINGS.md F17). NOTE: authored, not executed in the dev
# sandbox — validate on first run.
name: ci
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build   # prebuild runs gen:completions
